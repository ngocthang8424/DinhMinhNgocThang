name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      DH_USER: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DH_PASS: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kiểm tra secret Docker & DEPLOY_URL
        run: |
          if [ -z "${DH_USER}" ] || [ -z "${DH_PASS}" ]; then
            echo "::error::Thiếu cặp Docker Hub: DOCKERHUB_USERNAME + DOCKERHUB_TOKEN (hoặc DOCKER_USERNAME + DOCKER_PASSWORD)."
            exit 1
          fi
          if [ -z "${DEPLOY_URL}" ]; then
            echo "::error::Thiếu secret DEPLOY_URL — copy URL webhook trên trang lớp (Bước 1 hướng dẫn deploy)."
            exit 1
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DH_USER }}
          password: ${{ env.DH_PASS }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DH_USER }}/springboot-app:latest
          platforms: linux/amd64

      - name: Triển khai (pull) lên slot S5
        run: |
          REPO="${DH_USER}/springboot-app"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Deploy S5 thất bại."
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            exit 1
          fi
          echo "Deploy S5 thành công."
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
