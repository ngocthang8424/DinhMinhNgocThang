name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Ưu tiên DOCKERHUB_*; nếu trống dùng DOCKER_* (đúng tên trong bài mẫu CI/CD lớp)
      DOCKER_USER_RESOLVED: ${{ secrets.DOCKERHUB_USERNAME || secrets.DOCKER_USERNAME }}
      DOCKER_PASS_RESOLVED: ${{ secrets.DOCKERHUB_TOKEN || secrets.DOCKER_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Kiểm tra secret Docker Hub
      run: |
        if [ -z "${DOCKER_USER_RESOLVED}" ] || [ -z "${DOCKER_PASS_RESOLVED}" ]; then
          echo "::error::Thiếu username hoặc token. Vào Settings → Secrets and variables → Actions và thêm một trong hai bộ (cùng một cặp):"
          echo "  1) DOCKERHUB_USERNAME + DOCKERHUB_TOKEN"
          echo "  2) DOCKER_USERNAME + DOCKER_PASSWORD — token = Personal Access Token trên hub.docker.com, không dùng mật khẩu web."
          exit 1
        fi

    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        registry: docker.io
        username: ${{ env.DOCKER_USER_RESOLVED }}
        password: ${{ env.DOCKER_PASS_RESOLVED }}

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_USER_RESOLVED }}/dinhminhngocthang-app:latest
          ${{ env.DOCKER_USER_RESOLVED }}/dinhminhngocthang-app:${{ github.sha }}
        platforms: linux/amd64,linux/arm64

    - name: Triển khai lên slot S5
      run: |
        REPO="${DOCKER_USER_RESOLVED}/dinhminhngocthang-app"
        CONTAINER_PORT=80
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
        BODY=$(echo "$RESPONSE" | sed '$d')
        CODE=$(echo "$RESPONSE" | tail -n1)
        echo "Webhook HTTP: $CODE"
        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
        fi
        echo "Deploy thành công."
        echo "::group::Chi tiết webhook JSON"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"
