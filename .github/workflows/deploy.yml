name: Build and Push to Docker Hub

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DOCKER_USER_RESOLVED: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASS_RESOLVED: ${{ secrets.DOCKER_PASSWORD }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Make mvnw executable
      run: chmod +x ./mvnw

    - name: Build with Maven
      run: ./mvnw clean package -DskipTests

    - name: Kiểm tra secret Docker Hub
      run: |
        if [ -z "${DOCKER_USER_RESOLVED}" ] || [ -z "${DOCKER_PASS_RESOLVED}" ]; then
          echo "::error::Thiếu DOCKER_USERNAME hoặc DOCKER_PASSWORD."
          echo "Vào Settings → Secrets and variables → Actions → tạo đúng hai tên sau (Repository secrets):"
          echo "  DOCKER_USERNAME = Docker ID (vd: ngocthang8424), không dùng email."
          echo "  DOCKER_PASSWORD = Personal Access Token từ https://hub.docker.com/settings/security (Read & Write)."
          echo "Xóa các secret Docker cũ trùng tên sai hoặc cặp DOCKERHUB_* nếu không dùng nữa để tránh nhầm."
          exit 1
        fi

    - name: Login to Docker Hub
      run: |
        set -e
        u=$(printf '%s' "${DOCKER_USER_RESOLVED}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr '[:upper:]' '[:lower:]')
        p=$(printf '%s' "${DOCKER_PASS_RESOLVED}" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
        case "$u" in
          *@*)
            echo "::error::DOCKER_USERNAME không được là email. Dùng Docker ID hiển thị trên hub.docker.com (thường là ngocthang8424)."
            exit 1
            ;;
        esac
        if [ "${#p}" -lt 24 ]; then
          echo "::warning::DOCKER_PASSWORD có vẻ quá ngắn — cần dán cả chuỗi token (thường bắt đầu bằng dckr_pat_), không phải tên token hay mật khẩu web."
        fi
        printf '%s' "$p" | docker login docker.io --username "$u" --password-stdin
        echo "DOCKER_USER_NORMALIZED=${u}" >> "${GITHUB_ENV}"

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build and push to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ${{ env.DOCKER_USER_NORMALIZED }}/dinhminhngocthang-app:latest
          ${{ env.DOCKER_USER_NORMALIZED }}/dinhminhngocthang-app:${{ github.sha }}
        platforms: linux/amd64,linux/arm64

    - name: Triển khai lên slot S5
      run: |
        REPO="${DOCKER_USER_NORMALIZED}/dinhminhngocthang-app"
        CONTAINER_PORT=80
        RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${{ secrets.DEPLOY_URL }}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
        BODY=$(echo "$RESPONSE" | sed '$d')
        CODE=$(echo "$RESPONSE" | tail -n1)
        echo "Webhook HTTP: $CODE"
        if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
          echo "Deploy thất bại. Xem chi tiết trong nhóm log bên dưới."
          echo "::group::Chi tiết webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"
          exit 1
        fi
        echo "Deploy thành công."
        echo "::group::Chi tiết webhook JSON"
        echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
        echo "::endgroup::"
