name: CI/CD Docker

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      # Ưu tiên DOCKER_* (thường đúng trong lớp). Nếu trống mới dùng DOCKERHUB_*.
      # Nếu vẫn "unauthorized": xóa secret sai (nhập nhầm email/token cũ) — chỉ giữ một cặp đúng.
      DH_USER: ${{ secrets.DOCKER_USERNAME || secrets.DOCKERHUB_USERNAME }}
      DH_PASS: ${{ secrets.DOCKER_PASSWORD || secrets.DOCKERHUB_TOKEN }}
      DEPLOY_URL: ${{ secrets.DEPLOY_URL }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Kiểm tra secret Docker & DEPLOY_URL
        run: |
          if [ -z "${DH_USER}" ] || [ -z "${DH_PASS}" ]; then
            echo "::error::Thiếu Docker Hub: thêm Repository secrets — (ưu tiên) DOCKER_USERNAME + DOCKER_PASSWORD, hoặc DOCKERHUB_USERNAME + DOCKERHUB_TOKEN."
            exit 1
          fi
          if [ -z "${DEPLOY_URL}" ]; then
            echo "::error::Thiếu DEPLOY_URL — copy URL webhook trên trang lớp."
            exit 1
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub (chuẩn hóa token + docker login)
        run: |
          set -e
          u=$(printf '%s' "${DH_USER}" | sed '1s/^\xEF\xBB\xBF//' | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//' | tr '[:upper:]' '[:lower:]')
          p=$(printf '%s' "${DH_PASS}" | sed '1s/^\xEF\xBB\xBF//' | tr -d '\r\n' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          case "$u" in *@*)
            echo "::error::Username không được là email. Secret phải là Docker ID (vd ngocthang8424) — xem https://hub.docker.com → Account Settings."
            exit 1
            ;;
          esac
          echo "::notice::Sau chuẩn hóa: độ dài username=${#u}, token=${#p}"
          if [ "${#u}" -lt 1 ] || [ "${#u}" -gt 30 ]; then
            echo "::error::DOCKER_USERNAME sai: Docker ID hợp lệ thường 4–30 ký tự (vd ngocthang8424). Bạn đang có ${#u} ký tự → gần như chắc dán nhầm (URL, câu dài, copy nhầm secret khác)."
            echo "Sửa: https://hub.docker.com đăng nhập → góc phải avatar → Account settings → chỉ lấy \"Username\" ngắn, KHÔNG email, KHÔNG link."
            exit 1
          fi
          case "$p" in dckr_pat_*)
            if [ "${#p}" -lt 50 ]; then
              echo "::warning::Token chỉ ${#p} ký tự — PAT Docker Hub sau khi Generate thường dài hơn (thường ~50–120+). Nếu bước sau vẫn unauthorized: tạo token MỚI, dán vào Notepad kiểm tra đủ một dòng, rồi Update secret DOCKERHUB_TOKEN."
            fi
            ;;
          *)
            echo "::error::DOCKER_PASSWORD phải là Personal Access Token từ Docker Hub (chuỗi dài, bắt đầu dckr_pat_)."
            echo "KHÔNG dùng: mật khẩu đăng nhập Hub, token GitHub (ghp_), tên token (vd github-actions), hay chuỗi ngắn ${#p} ký tự."
            echo "Làm lại: Hub → Account Settings → Security → Personal access tokens → Generate new token (Read & Write) → Copy ngay (một dòng dài) → GitHub secret DOCKER_PASSWORD."
            exit 1
            ;;
          esac
          printf '%s' "$p" | docker login docker.io --username "$u" --password-stdin
          echo "DH_USER=${u}" >> "${GITHUB_ENV}"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.DH_USER }}/springboot-app:latest
          platforms: linux/amd64

      - name: Triển khai (pull) lên slot S5
        run: |
          REPO="${DH_USER}/springboot-app"
          CONTAINER_PORT=80
          RESPONSE=$(curl -sS -w "\n%{http_code}" -X POST "${DEPLOY_URL}?repo=$REPO&tag=latest&slot=5&container_port=$CONTAINER_PORT&strict_container_port=0")
          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)
          echo "Webhook HTTP: $CODE"
          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "::error::Deploy S5 thất bại."
            echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
            exit 1
          fi
          echo "Deploy S5 thành công."
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
